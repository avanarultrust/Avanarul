<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Your Formal Profile | Avanarul Trust</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Inter:wght@300;400;500;600;700;800&family=Playfair+Display:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Navigation -->
  <nav class="navbar" id="navbar">
    <div class="nav-container">
      <a href="index.html" class="nav-logo">
        <img src="/logo.jpeg" alt="Avanarul Trust" class="logo-img">
        <span class="logo-name">Avanarul Trust</span>
      </a>
      <a href="index.html" class="btn-outline"><i class="fas fa-arrow-left"></i> <span>Back</span></a>
    </div>
  </nav>

  <main class="profile-container">
    <div class="profile-card">
      <div class="loading-state" id="loading-indicator">
        <i class="fas fa-circle-notch fa-spin fa-2x" style="margin-bottom:15px;"></i>
        <p>Loading user profile...</p>
      </div>

      <div id="profile-content" style="display: none;">
        <div class="profile-header">
          <div class="profile-avatar"><i class="fas fa-user-tie"></i></div>
          <div class="profile-title">
            <h1 id="display-name">Loading...</h1>
            <p><i class="fas fa-star"></i> Member Account · Avanarul Trust</p>
          </div>
        </div>

        <div class="profile-body">
          <div class="info-row">
            <div class="info-label">Account UID</div>
            <div class="info-data" id="display-id" style="font-family: monospace;">-</div>
          </div>
          <div class="info-row">
            <div class="info-label">Email Address</div>
            <div class="info-data" id="display-email">-</div>
          </div>
          <div class="info-row">
            <div class="info-label">Mobile Number</div>
            <div class="info-data" id="display-mobile">-</div>
          </div>
          <div class="info-row">
            <div class="info-label">Account Status</div>
            <div class="info-data"><span class="status-badge"><i class="fas fa-check-circle"></i> Verified</span></div>
          </div>
        </div>

        <!-- Donation History Section -->
        <div style="padding: 24px 32px; border-top: 1px solid var(--border);">
          <h3 style="font-family: 'Playfair Display', serif; font-size: 1.1rem; margin-bottom: 15px; color: var(--text);">
            <i class="fas fa-hand-holding-heart" style="color: var(--gold-bright); margin-right: 8px;"></i> Recent Donations
          </h3>
          <div id="donation-list">
            <p style="font-size: 0.85rem; color: var(--text-muted); text-align: center; padding: 20px;">Fetching donation history...</p>
          </div>
        </div>

        <div class="profile-footer">
          <a href="index.html" class="btn-home-link"><i class="fas fa-home" style="margin-right:6px;"></i>Home</a>
          <button id="btn-profile-logout" class="btn-danger"><i class="fas fa-sign-out-alt" style="margin-right:6px;"></i>Sign Out</button>
        </div>
      </div>
    </div>
  </main>

  <script type="module" src="/profile.js"></script>
</body>
</html>
